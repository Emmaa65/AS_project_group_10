exploration_manager:
  ros__parameters:
    # Cave entrance position (must match planner waypoint!)
    cave_entrance_x: -330.0
    cave_entrance_y: 10.0
    cave_entrance_z: 20.0
    
    # Tolerance for considering the drone "at" the cave entrance [meters]
    entrance_reach_tolerance: 1.5
    
    # Frontier selection update rate [Hz]
    frontier_update_rate: 2.0
    
    # Distance constraints for frontier selection [meters]
    min_frontier_distance: 0.0
    max_frontier_distance: 200.0  # Increased from 50m to allow distant frontier exploration
    cave_interior_margin_x: 1.0   # Require frontier x < cave_entrance_x - margin
    frontier_blacklist_radius: 15.0  # Reject new frontiers near failed/stalled goals
    frontier_stall_timeout_s: 20.0  # Abandon current frontier if no progress for this long
    frontier_progress_epsilon_m: 0.3  # Minimum distance improvement that counts as progress
    
    # Logging level
    log_level: "INFO"

rrt_path_planner:
  ros__parameters:
    # RRT planning parameters
    max_planning_time: 1.0       # seconds
    step_size: 5.0               # meters (larger = fewer waypoints)
    max_iterations: 1000         # iterations
    
    # Trajectory generation
    max_velocity: 2.0            # m/s (increased for faster flight)
    max_acceleration: 1.0        # m/s² (increased for faster flight)
    
    # Replanning
    replan_threshold: 0.5        # meters (only replan if target moves more than this) - aggressive for cave exploration
    periodic_replan_interval_s: 60.0   # seconds (safety replan only)
    periodic_replan_min_progress_m: 1.0  # meters (only periodic replan if progress is below this over interval)
    
    # Cave parameters
    cave_entrance_x: -330.0      # Cave entrance X position (must match exploration_manager!)
    cave_entrance_y: 10.0
    cave_entrance_z: 20.0
    #min_frontier_z: -33.5        # Minimum safe height (negative to accept low points)
    
    # Collision checking parameters
    collision_check_resolution: 0.3  # meters (resolution for checking collision-free path)
    robot_radius: 0.3                # meters (safety sphere around drone center; drone is 0.2x0.2m)
    
    # Logging level
    log_level: "INFO"
